function isReady(b) {
  if (!b.boireDes) return false;

  } else {
    d = new Date(b.boireDes);
  }
  if (isNaN(d)) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d <= today;
}

// ═══════════════════════════════════════════
// SMART SEARCH ENGINE
// ═══════════════════════════════════════════

/** Normalise une chaîne : minuscules + suppression des accents */
function norm(s) {
  return (s || "")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

/**
 * Calcule un score de pertinence pour une bouteille vis-à-vis d'un token.
 * Retourne 0 si aucun champ ne matche, > 0 sinon.
 * Plus le score est élevé, plus la correspondance est précise.
 */
function scoreToken(b, token) {
  const fields = [
    { key: norm(b.nom),          weight: 10 },
    { key: norm(b.producteur),   weight: 8  },
    { key: norm(b.appellation),  weight: 6  },
    { key: norm(b.region),       weight: 5  },
    { key: norm(b.cepage),       weight: 5  },
    { key: norm(b.sousRegion),   weight: 4  },
    { key: norm(b.annee),        weight: 3  },
    { key: norm(b.lieuAchat),    weight: 2  },
    { key: norm(b.emplacement),  weight: 2  },
    { key: String(b.rangement || ""), weight: 4 },
  ];

  let best = 0;
  for (const { key, weight } of fields) {
    if (!key) continue;
    if (key === token)             { best = Math.max(best, weight * 3); continue; } // exact
    if (key.startsWith(token))     { best = Math.max(best, weight * 2); continue; } // préfixe
    if (key.includes(token))       { best = Math.max(best, weight);     continue; } // contient
  }
  return best;
}

/**
 * Recherche intelligente multi-tokens.
 * - Insensible aux accents et à la casse
 * - Tous les tokens doivent matcher (logique AND)
 * - Détecte "case N" / "N" comme numéro de case
 * - Trie par score décroissant
 */
function smartSearch(bottles, query) {
  const q = norm(query);
  if (q.length < 1) return [];

  // Détection requête type "case 3" → on extrait le numéro
  const caseMatch = q.match(/^(?:case\s*)?(\d+)$/);

  const tokens = q.split(/\s+/).filter(t => t.length > 0);

  const scored = [];
  for (const b of bottles) {
    // Recherche par numéro de case exact
    if (caseMatch) {
      if (String(b.rangement) === caseMatch[1]) {
        scored.push({ b, score: 999 });
        continue;
      }
    }

    // Score multi-token : chaque token doit avoir un score > 0
    let total = 0;
    let allMatch = true;
    for (const token of tokens) {
      const s = scoreToken(b, token);
      if (s === 0) { allMatch = false; break; }
      total += s;
    }
    if (allMatch) scored.push({ b, score: total });
  }

  return scored
    .sort((a, b) => b.score - a.score)
    .map(({ b }) => b);
}

// ═══════════════════════════════════════════
// FETCH WITH RETRY + TIMEOUT
// ═══════════════════════════════════════════
async function fetchWithRetry(url, retries = 3, timeoutMs = 10000) {
  for (let attempt = 1; attempt <= retries; attempt++) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const r = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch (err) {
      clearTimeout(timer);
      const isLast = attempt === retries;
      if (isLast) throw err;
      // Attente exponentielle : 1s, 2s, 4s...
      await new Promise(res => setTimeout(res, 1000 * attempt));
    }
  }
}

// GOOGLE APPS SCRIPT CODE (for settings)
// ═══════════════════════════════════════════
const GAS_CODE = `// ─────────────────────────────────────────────────────────────────
// Cave à vin — Google Apps Script v3
// - Lecture par nom d'en-tête (robuste si colonnes bougent)
// - Normalisation des en-têtes avec retours à la ligne
// - Tout en GET pour éviter les blocages CORS
// ─────────────────────────────────────────────────────────────────
const SHEET_ID   = '1z0UvtYSB7zvOSpdo-YPB2eBNi9FKKbYO-a2RcEp-dQ8';
const SHEET_NAME = 'Ma Cave';

const COL_MAP = {
  'ref':          'ref',
  'rangement':    'rangement',
  "date d'achat": 'dateAchat',
  "prix d'achat": 'prixAchat',
  "lieu d'achat": 'lieuAchat',
  'producteur':   'producteur',
  'nom':          'nom',
  'couleur':      'couleur',
  'annee':        'annee',
  'region':       'region',
  'appellation':  'appellation',
  'sous region':  'sousRegion',
  'cepage':       'cepage',
  'emplacement':  'emplacement',
  'boire des':    'boireDes',
  'boire jusque': 'boireJusque',
  'image':        'image',
};

function normHdr(h) {
  return h.toString()
    .replace(/\\r?\\n/g, ' ')
    .trim()
    .toLowerCase()
    .normalize('NFD').replace(/[\\u0300-\\u036f]/g, '');
}

function normCouleur(v) {
  if (!v) return '';
  const s = v.toString().trim().toLowerCase();
  if (s === 'rouge') return 'Rouge';
  if (s === 'blanc') return 'Blanc';
  if (s.startsWith('ros')) return 'Rose';
  return v.toString().trim().charAt(0).toUpperCase() + v.toString().trim().slice(1);
}

function fmtDate(v) {
  if (!v) return '';
  if (v instanceof Date) {
    const d = v.getDate().toString().padStart(2,'0');
    const m = (v.getMonth()+1).toString().padStart(2,'0');
    return d+'/'+m+'/'+v.getFullYear();
  }
  return v.toString().trim();
}

function fmtPrice(v) {
  if (!v && v !== 0) return '';
  if (typeof v === 'number') return v.toFixed(2).replace('.',',') + ' €';
  return v.toString().trim();
}

function fmtAnnee(v) {
  if (!v) return '';
  if (v instanceof Date) return v.getFullYear().toString();
  const n = parseInt(v.toString().trim());
  if (!isNaN(n) && n > 1800 && n < 2100) return String(n);
  return v.toString().trim();
}

function doGet(e) {
  const action = (e && e.parameter && e.parameter.action) || 'get';
  const s    = SpreadsheetApp.openById(SHEET_ID).getSheetByName(SHEET_NAME);
  const all  = s.getDataRange().getValues();
  const rawHdrs = all[0];

  const idx = {};
  rawHdrs.forEach((h, i) => {
    const norm = normHdr(h);
    if (COL_MAP[norm]) idx[COL_MAP[norm]] = i;
  });

  function cell(row, key) {
    return idx[key] !== undefined ? row[idx[key]] : '';
  }

  if (action === 'debug') {
    return json({ raw: rawHdrs.map(String), normalized: rawHdrs.map(normHdr), idx: idx });
  }

  if (action === 'get') {
    const refIdx = idx['ref'] !== undefined ? idx['ref'] : 0;
    const rows   = all.slice(1).filter(r => r[refIdx] !== '' && r[refIdx] !== null && r[refIdx] !== undefined);
    const data   = rows.map(r => ({
      ref:         String(cell(r,'ref')         || ''),
      rangement:   cell(r,'rangement') !== '' && cell(r,'rangement') !== null ? Number(cell(r,'rangement')) : null,
      dateAchat:   fmtDate(cell(r,'dateAchat')),
      prixAchat:   fmtPrice(cell(r,'prixAchat')),
      lieuAchat:   String(cell(r,'lieuAchat')   || ''),
      producteur:  String(cell(r,'producteur')  || ''),
      nom:         String(cell(r,'nom')         || ''),
      couleur:     normCouleur(cell(r,'couleur')),
      annee:       fmtAnnee(cell(r,'annee')),
      region:      String(cell(r,'region')      || ''),
      appellation: String(cell(r,'appellation') || ''),
      sousRegion:  String(cell(r,'sousRegion')  || ''),
      cepage:      String(cell(r,'cepage')      || ''),
      emplacement: String(cell(r,'emplacement') || ''),
      boireDes:    fmtDate(cell(r,'boireDes')),
      boireJusque: fmtDate(cell(r,'boireJusque')),
      image:       String(cell(r,'image')       || ''),
    }));
    return json(data);
  }

  if (action === 'add') {
    const b       = JSON.parse(decodeURIComponent(e.parameter.data || '{}'));
    const refIdx  = idx['ref'] !== undefined ? idx['ref'] : 0;
    const refs    = all.slice(1).map(r => Number(r[refIdx]) || 0);
    const nextRef = Math.max(0, ...refs) + 1;
    const row     = new Array(rawHdrs.length).fill('');
    rawHdrs.forEach((h, i) => {
      const norm = normHdr(h);
      const key  = COL_MAP[norm];
      if (key && b[key] !== undefined && b[key] !== '') row[i] = b[key];
    });
    row[refIdx] = nextRef;
    s.appendRow(row);
    return json({ ok: true, ref: nextRef });
  }

  if (action === 'remove') {
    const ref    = String(e.parameter.ref || '');
    const refIdx = idx['ref'] !== undefined ? idx['ref'] : 0;
    for (let i = all.length - 1; i >= 1; i--) {
      if (String(all[i][refIdx]) === ref) { s.deleteRow(i + 1); break; }
    }
    return json({ ok: true });
  }

  return json({ error: 'action inconnue' });
}

function json(d) {
  const o = ContentService.createTextOutput(JSON.stringify(d));
  o.setMimeType(ContentService.MimeType.JSON);
  return o;
}`;

  const [copied, setCopied]       = useState(false);
  const [showValeur, setShowValeur] = useState(false);
  const [editRef, setEditRef]         = useState(null);
  const [editForm, setEditForm]       = useState(null);
  const [allFilter, setAllFilter]     = useState("");
  const [allColorFilter, setAllColorFilter] = useState("");
  const [allReadyFilter, setAllReadyFilter] = useState(false);
  const [theme, setTheme]           = useState(() => localStorage.getItem('cave_theme') || 'dark');
  // For retry on add error
  const [lastFailedAction, setLastFailedAction] = useState(null);
  const toastRef                  = useRef(null);

  // ── INIT ──
  useEffect(() => {
    const savedUrl   = localStorage.getItem("cave_gas") || GAS_URL;
    const savedCaves = localStorage.getItem("cave_list");
    setGasUrl(savedUrl);
    setGasInput(savedUrl);
    if (savedCaves) setCaves(JSON.parse(savedCaves));
    loadFromGas(savedUrl);
  }, []);

  // ── COMPUTED ──
  const offset = (cave - 1) * 8;

  const slotData = useMemo(() => {
    const r = {};
    for (let i = 1; i <= 8; i++) {
      const sn = offset + i;
      const bs = bottles
        .filter(b => Number(b.rangement) === sn)
        .sort((a, b) => (a.nom || "").localeCompare(b.nom || "", "fr"));
      r[i] = { bottles: bs, count: bs.length, colors: [...new Set(bs.map(b => b.couleur))] };
    }
    return r;
  }, [bottles, offset]);

  const slotBottles = useMemo(() => {
    if (!slot) return [];
    return bottles
      .filter(b => Number(b.rangement) === slot)
      .sort((a, b) => (a.nom || "").localeCompare(b.nom || "", "fr"));
  }, [bottles, slot]);

  const searchResults = useMemo(() => {
    if (search.trim().length < 1) return [];
    return smartSearch(bottles, search);
  }, [bottles, search]);

  const totalBottles = bottles.filter(b => b.rangement != null && b.rangement !== "").length;
  const rougeCount = bottles.filter(b => b.couleur === "Rouge").length;
  const blancCount = bottles.filter(b => b.couleur === "Blanc").length;
  const totalValeur = useMemo(() => {
    let sum = 0;
    let count = 0;
    bottles.forEach(b => {
      if (!b.prixAchat) return;
      const clean = b.prixAchat.toString().replace(/[^0-9,\.]/g, '').replace(',', '.');
      const val = parseFloat(clean);
      if (!isNaN(val) && val > 0) { sum += val; count++; }
    });
    return { sum, count };
  }, [bottles]);
  const isDemo = !gasUrl;

  // ── METHODS ──
  function showToast(msg, type = "ok") {
    setToast(msg);
    setToastType(type);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2100);
  }

  function navTo(v, params = {}) {
    setNavStack(s => [...s, view]);
    if (params.bottle !== undefined) setBottle(params.bottle);
    setView(v);
  }

  function goBack() {
    const prev = navStack[navStack.length - 1] || "cave";
    setNavStack(s => s.slice(0, -1));
    setView(prev);
    setConfirm(null);
  }

  function openSlot(i) {
    setSlot(offset + i);
    setSheet(true);
  }

  function openList() {
    setSheet(false);
    setView("list");
  }

  function openAdd() {
    setSheet(false);
    setForm(emptyForm(slot));
    setView("add");
  }

  async function loadFromGas(url) {
    if (!url) return;
    setLoading(true);
    try {
      const data = await fetchWithRetry(`${url}?action=get`);
      if (Array.isArray(data)) {
        setBottles(data);
        showToast("Données chargées ✓");
      }
    } catch(err) {
      if (err.name === "AbortError") {
        showToast("Délai dépassé — vérifiez votre connexion", "err");
      } else {
        showToast("Connexion impossible (3 tentatives)", "err");
      }
    }
    setLoading(false);
  }

  async function addBottle() {
    if (!form.nom.trim()) return;
    setLoading(true);
    setLastFailedAction(null);
    if (gasUrl) {
      try {
        const encoded = encodeURIComponent(JSON.stringify(form));
        await fetchWithRetry(`${gasUrl}?action=add&data=${encoded}`);
        await loadFromGas(gasUrl);
        showToast("Bouteille ajoutée ✓");
        goBack();
      } catch(err) {
        if (err.name === "AbortError") {
          showToast("Délai dépassé — réessayez", "err");
        } else {
          showToast("Erreur réseau (3 tentatives échouées)", "err");
        }
        setLastFailedAction("add");
      }
    } else {
      const nextRef = String(Math.max(0, ...bottles.map(b => Number(b.ref) || 0)) + 1);
      setBottles(prev => [...prev, { ...form, ref: nextRef }]);
      showToast("Bouteille ajoutée ✓");
      goBack();
    }
    setLoading(false);
  }

  async function removeBottle(ref) {
    setConfirm(null);
    setLoading(true);
    if (gasUrl) {
      try {
        await fetchWithRetry(`${gasUrl}?action=remove&ref=${encodeURIComponent(ref)}`);
        await loadFromGas(gasUrl);
        showToast("Bouteille retirée ✓");
      } catch(err) {
        if (err.name === "AbortError") {
          showToast("Délai dépassé — réessayez", "err");
        } else {
          showToast("Erreur réseau (3 tentatives échouées)", "err");
        }
      }
    } else {
      setBottles(prev => prev.filter(b => b.ref !== ref));
      showToast("Bouteille retirée ✓");
    }
    setLoading(false);
  }

  function openEdit(b) {
    setEditRef(b.ref);
    setEditForm({ ...b });
    navTo("edit");
  }

  function efset(k) { return e => setEditForm(f => ({ ...f, [k]: e.target.value })); }

  async function saveEdit() {
    if (!editForm || !editForm.nom.trim()) return;
    setLoading(true);
    if (gasUrl) {
      try {
        await fetchWithRetry(`${gasUrl}?action=remove&ref=${encodeURIComponent(editRef)}`);
        const encoded = encodeURIComponent(JSON.stringify({ ...editForm, ref: editRef }));
        await fetchWithRetry(`${gasUrl}?action=add&data=${encoded}`);
        await loadFromGas(gasUrl);
        showToast("Bouteille modifiée ✓");
        goBack();
      } catch(err) {
        if (err.name === "AbortError") {
          showToast("Délai dépassé — réessayez", "err");
        } else {
          showToast("Erreur réseau (3 tentatives échouées)", "err");
        }
      }
    } else {
      setBottles(prev => prev.map(b => b.ref === editRef ? { ...editForm, ref: editRef } : b));
      showToast("Bouteille modifiée ✓");
      goBack();
    }
    setLoading(false);
  }

  function addCave() {
    const next = caves.length + 1;
    const newC = [...caves, next];
    setCaves(newC);
    localStorage.setItem("cave_list", JSON.stringify(newC));
    setCave(next);
  }

  function deleteCave(c) {
    const offset = (c - 1) * 8;
    const hasBtl = bottles.some(b => {
      const r = Number(b.rangement);
      return r >= offset + 1 && r <= offset + 8;
    });
    if (hasBtl) { showToast("Retirez d'abord les bouteilles de cette cave", "err"); return; }
    const newC = caves.filter(x => x !== c);
    setCaves(newC);
    localStorage.setItem("cave_list", JSON.stringify(newC));
    if (cave === c) setCave(newC[newC.length - 1] || 1);
    showToast("Cave supprimée");
  }

  function saveGas() {
    localStorage.setItem("cave_gas", gasInput);
    setGasUrl(gasInput);
    loadFromGas(gasInput);
  }

  function copyGas() {
    navigator.clipboard.writeText(GAS_CODE).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  function toggleTheme() {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem('cave_theme', next);
  }

  function fset(k) { return e => setForm(f => ({ ...f, [k]: e.target.value })); }

  // ── BOTTLE ROW COMPONENT ──
  function BottleRow({ b, onInfo, onDel }) {
    return (
      <div className="brow">
        <div className="bthumb">
          {b.image ? <img src={b.image} alt={b.nom} /> : "🍾"}
          <span className="bthumb-dot" style={{ background: wc(b.couleur) }} />
        </div>
        <div className="binfo" onClick={onInfo}>
          <span className="bname">{b.nom || "—"}</span>
          {isReady(b) && (
            <span className="ready-badge" title={"À boire dès " + b.boireDes}>
              <svg width="9" height="9" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="#4caf50" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              À boire
            </span>
          )}
          <span className="bprod">{b.producteur || ""}{b.producteur && b.annee ? <span className="bannee"> · {b.annee}</span> : b.annee ? <span className="bannee">{b.annee}</span> : null}</span>
        </div>
        <div className="bactions">
          <button className="abtn" onClick={onInfo} title="Informations">{Ico.info}</button>
          <button className="abtn del" onClick={onDel} title="Retirer">{Ico.trash}</button>
        </div>
      </div>
    );
  }

  // ── RENDER ──
  return (
    <div className={`app ${theme}`}>
      <style>{CSS}</style>

      {/* ══ CAVE VIEW ══ */}
      {view === "cave" && (
        <>
          <div className="hdr">
            <div>
              <div className="hdr-title">Ma Cave</div>
              <div className="hdr-sub">{totalBottles} bouteille{totalBottles !== 1 ? "s" : ""} rangée{totalBottles !== 1 ? "s" : ""}</div>
            </div>
            <div className="hdr-right">
              <button className="ibtn" onClick={() => setShowValeur(true)} title="Valeur de la cave">{Ico.euro}</button>
              <button className="ibtn" onClick={toggleTheme} title="Changer le thème">{theme === 'dark' ? Ico.sun : Ico.moon}</button>
              <button className="ibtn" onClick={() => navTo("allwines")} title="Tous les vins">{Ico.list}</button>
            </div>
          </div>

          <div className="stats">
            <div className="stat">
              <div className="stat-n" style={{ color: "#9b2030" }}>{rougeCount}</div>
              <div className="stat-l">Rouge</div>
            </div>
            <div className="stat-div" />
            <div className="stat">
              <div className="stat-n" style={{ color: "#c4a245" }}>{blancCount}</div>
              <div className="stat-l">Blanc</div>
            </div>
            <div className="stat-div" />
            <div className="stat">
              <div className="stat-n" style={{ color: "#c97080" }}>{bottles.filter(b => b.couleur === "Rosé" || b.couleur === "Rose").length}</div>
              <div className="stat-l">Rosé</div>
            </div>
            <div className="stat-div" />
            <div className="stat">
              <div className="stat-n">{bottles.length}</div>
              <div className="stat-l">Total</div>
            </div>
          </div>

          <div className="sbar">
            <div className="sbar-inner">
              {Ico.search}
              <input
                className="sbar-input"
                placeholder="Nom, domaine, cépage, case…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                onFocus={() => { if (search.length >= 1) navTo("search"); }}
              />
              {search && (
                <button style={{ background: "none", border: "none", color: "#5a4a3a", cursor: "pointer", fontSize: 18, lineHeight: 1 }}
                  onClick={() => setSearch("")}>×</button>
              )}
            </div>
          </div>

          {search.length >= 1 ? (
            <SearchList results={searchResults} onSelect={b => navTo("detail", { bottle: b })} />
          ) : (
            <>
              <div className="cave-tabs">
                {caves.map(c => (
                  <span key={c} style={{ display: "inline-flex", alignItems: "center", gap: 2 }}>
                    <button className={`ctab ${cave === c ? "on" : ""}`} onClick={() => setCave(c)}>
                      Cave {c}
                    </button>
                    {cave === c && caves.length > 1 && (
                      <button onClick={() => deleteCave(c)} title="Supprimer cette cave"
                        style={{ background: "none", border: "none", cursor: "pointer", color: cave === c ? "#181210" : "#7a2030",
                          fontSize: 16, lineHeight: 1, padding: "2px 4px", marginLeft: -4,
                          borderRadius: "0 20px 20px 0", opacity: 0.7 }}>
                        ×
                      </button>
                    )}
                  </span>
                ))}
                {caves.length < 4 && (
                  <button className="ctab add" onClick={addCave}>+ Cave</button>
                )}
              </div>

              <div className="cave-wrap">
                <div className="cave-frame">
                  <div className="cave-top">
                    <span className="cave-top-label">Cave {cave} · Cases {offset + 1}–{offset + 8}</span>
                    <span className="cave-top-count">
                      {Object.values(slotData).reduce((s, d) => s + d.count, 0)} / {8 * MAX}
                    </span>
                  </div>

                  {[8, 7, 6, 5, 4, 3, 2, 1].map(i => {
                    const d = slotData[i];
                    const pct = Math.min(100, (d.count / MAX) * 100);
                    const mainColor = d.colors[0] ? wc(d.colors[0]) : "#ffffff";
                    return (
                      <div key={i} className="slot" onClick={() => openSlot(i)}>
                        <div className="slot-fill" style={{ width: `${pct}%`, background: mainColor }} />
                        <div className="slot-num">{offset + i}</div>
                        <div className="slot-body">
                          {d.count > 0 ? (
                            <>
                              <div className="slot-dots">
                                {d.colors.map(c => (
                                  <div key={c} className="dot" style={{ background: wc(c) }} />
                                ))}
                              </div>
                              <div className={`slot-count ${d.count >= MAX ? "full" : ""}`}>
                                {d.count} / {MAX} bouteille{d.count > 1 ? "s" : ""}
                              </div>
                              <div className="slot-names">
                                {d.bottles.slice(0, 2).map(b => b.nom).join(" · ")}
                                {d.bottles.length > 2 ? " …" : ""}
                              </div>
                            </>
                          ) : (
                            <div className="slot-empty">Case vide</div>
                          )}
                        </div>
                        <div className="slot-arrow">›</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}
        </>
      )}

      {/* ══ LIST VIEW ══ */}
      {view === "list" && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div style={{ flex: 1 }}>
              <div className="phdr-title">Case {slot}</div>
              <div className="phdr-sub">{slotBottles.length} / {MAX} bouteille{slotBottles.length !== 1 ? "s" : ""}</div>
            </div>
            {slotBottles.length < MAX && (
              <button className="ibtn" onClick={() => { setForm(emptyForm(slot)); setView("add"); }}>{Ico.plus}</button>
            )}
          </div>

          {confirm ? (
            <div className="confirm-wrap">
              <div className="confirm-box">
                <div className="confirm-t">Retirer cette bouteille ?</div>
                <div className="confirm-d">
                  <strong>{confirm.nom}</strong>{confirm.producteur ? ` — ${confirm.producteur}` : ""}
                  {confirm.annee ? ` (${confirm.annee})` : ""}
                </div>
                <div className="confirm-acts">
                  <button className="bghst" onClick={() => setConfirm(null)}>Annuler</button>
                  <button className="bdang" onClick={() => removeBottle(confirm.ref)}>Retirer</button>
                </div>
              </div>
            </div>
          ) : slotBottles.length === 0 ? (
            <div className="no-bottles">Aucune bouteille dans cette case</div>
          ) : (
            slotBottles.map(b => (
              <BottleRow key={b.ref} b={b}
                onInfo={() => navTo("detail", { bottle: b })}
                onDel={() => setConfirm(b)} />
            ))
          )}
        </div>
      )}

      {/* ══ DETAIL VIEW ══ */}
      {view === "detail" && bottle && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div className="phdr-title">Fiche bouteille</div>
          </div>
          <div className="det">
            <div className="det-hero">
              <div className="det-img">
                {bottle.image
                  ? <img src={bottle.image} alt={bottle.nom} onError={e => { e.target.style.display = "none"; }} />
                  : "🍾"}
              </div>
              <div className="det-meta">
                <div className="det-name">{bottle.nom || "—"}</div>
                <div className="det-prod">{bottle.producteur || ""}</div>
                {isReady(bottle) && (
                  <div style={{ marginTop: 6 }}>
                    <span className="ready-badge" style={{ fontSize: 11, padding: "3px 10px 3px 7px" }}>
                      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                        <path d="M2 6l3 3 5-5" stroke="#4caf50" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                      À maturité depuis le {bottle.boireDes}
                    </span>
                  </div>
                )}
                {bottle.couleur && (
                  <div style={{ marginTop: 8 }}>
                    <span className="badge" style={{
                      background: wc(bottle.couleur) + "22",
                      color: wc(bottle.couleur),
                      border: `1px solid ${wc(bottle.couleur)}44`,
                    }}>
                      <span style={{ width: 7, height: 7, borderRadius: "50%", background: wc(bottle.couleur), display: "inline-block" }} />
                      {bottle.couleur}
                    </span>
                  </div>
                )}
              </div>
            </div>

            <div>
              {[
                ["Millésime",   bottle.annee],
                ["Région",      bottle.region],
                ["Appellation", bottle.appellation],
                ["Sous-région", bottle.sousRegion],
                ["Cépage",      bottle.cepage],
                ["Case",        bottle.rangement ? `Case ${bottle.rangement}` : null],
                ["Emplacement", bottle.emplacement],
                ["Date d'achat", bottle.dateAchat],
                ["Prix",        bottle.prixAchat],
                ["Lieu d'achat", bottle.lieuAchat],
                ["Boire dès",   bottle.boireDes],
                ["Boire jusque", bottle.boireJusque],
              ].filter(([, v]) => v).map(([l, v]) => (
                <div key={l} className="irow">
                  <div className="ilabel">{l}</div>
                  <div className="ivalue">{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ══ ADD BOTTLE ══ */}
      {view === "add" && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div className="phdr-title">Ajouter une bouteille</div>
          </div>
          <div className="aform">
            <div>
              <label className="flabel">Nom *</label>
              <input className="finput" value={form.nom} onChange={fset("nom")} placeholder="Ex : Château Pétrus" />
            </div>
            <div>
              <label className="flabel">Producteur</label>
              <input className="finput" value={form.producteur} onChange={fset("producteur")} placeholder="Ex : Domaine Mayard" />
            </div>
            <div>
              <label className="flabel">Couleur</label>
              <div className="cpicker">
                {["Rouge", "Blanc", "Rosé"].map(c => (
                  <button key={c}
                    className={`copt ${form.couleur === c ? "s" + c.toLowerCase().replace("é", "e")[0] : ""}`}
                    style={form.couleur === c ? {
                      borderColor: wc(c) + "cc",
                      color: wc(c),
                      background: wc(c) + "18",
                    } : {}}
                    onClick={() => setForm(f => ({ ...f, couleur: c }))}>
                    {c}
                  </button>
                ))}
              </div>
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Millésime</label>
                <input className="finput" type="number" value={form.annee} onChange={fset("annee")} placeholder="2022" min="1900" max="2030" />
              </div>
              <div>
                <label className="flabel">Case</label>
                <input className="finput" type="number" value={form.rangement} onChange={fset("rangement")} placeholder={String(slot || "")} min="1" />
              </div>
            </div>
            <div>
              <label className="flabel">Région</label>
              <input className="finput" value={form.region} onChange={fset("region")} placeholder="Ex : Rhône" />
            </div>
            <div>
              <label className="flabel">Appellation</label>
              <input className="finput" value={form.appellation} onChange={fset("appellation")} placeholder="Ex : Châteauneuf-du-Pape" />
            </div>
            <div>
              <label className="flabel">Sous-région</label>
              <input className="finput" value={form.sousRegion} onChange={fset("sousRegion")} placeholder="Ex : Vaucluse" />
            </div>
            <div>
              <label className="flabel">Cépage</label>
              <input className="finput" value={form.cepage} onChange={fset("cepage")} placeholder="Ex : Grenache, Syrah" />
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Date d'achat</label>
                <input className="finput" type="date" value={form.dateAchat} onChange={fset("dateAchat")} />
              </div>
              <div>
                <label className="flabel">Prix</label>
                <input className="finput" value={form.prixAchat} onChange={fset("prixAchat")} placeholder="Ex : 35,00 €" />
              </div>
            </div>
            <div>
              <label className="flabel">Lieu d'achat</label>
              <input className="finput" value={form.lieuAchat} onChange={fset("lieuAchat")} placeholder="Ex : Mr Vin" />
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Boire dès</label>
                <input className="finput" type="date" value={form.boireDes} onChange={fset("boireDes")} />
              </div>
              <div>
                <label className="flabel">Boire jusque</label>
                <input className="finput" type="date" value={form.boireJusque} onChange={fset("boireJusque")} />
              </div>
            </div>
            <div>
              <label className="flabel">Image (URL)</label>
              <input className="finput" value={form.image} onChange={fset("image")} placeholder="https://..." />
            </div>
            <div>
              <label className="flabel">Emplacement précis</label>
              <input className="finput" value={form.emplacement} onChange={fset("emplacement")} placeholder="Position dans la case (optionnel)" />
            </div>
          </div>
          <div className="stick-btn">
            {lastFailedAction === "add" ? (
              <button className="btnp" onClick={addBottle} disabled={loading}
                style={{ background: "#9b2030", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                {Ico.retry} Réessayer l'envoi
              </button>
            ) : (
              <button className="btnp" onClick={addBottle} disabled={!form.nom.trim() || loading}>
                {loading ? "Envoi en cours…" : "Ajouter la bouteille"}
              </button>
            )}
          </div>
        </div>
      )}

      {/* ══ SEARCH VIEW ══ */}
      {view === "search" && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div style={{ flex: 1, paddingRight: 4 }}>
              <input className="finput" autoFocus
                style={{ padding: "9px 13px" }}
                placeholder="Producteur, cépage, nom…"
                value={search}
                onChange={e => setSearch(e.target.value)} />
            </div>
          </div>
          <SearchList results={searchResults} onSelect={b => navTo("detail", { bottle: b })} />
        </div>
      )}

      {/* ══ ALL WINES VIEW ══ */}
      {view === "allwines" && (() => {
        const filtered = (() => {
          // Appliquer d'abord la recherche textuelle intelligente
          let base = allFilter.trim().length > 0
            ? smartSearch(bottles, allFilter)
            : [...bottles].sort((a, b) => (a.nom || "").localeCompare(b.nom || "", "fr"));

          // Puis les filtres couleur & maturité
          return base.filter(b => {
            const matchColor = !allColorFilter ||
              b.couleur === allColorFilter ||
              (allColorFilter === "Rosé" && (b.couleur === "Rose" || b.couleur === "Rosé"));
            const matchReady = !allReadyFilter || isReady(b);
            return matchColor && matchReady;
          });
        })();

        const activeFiltersCount = (allColorFilter ? 1 : 0) + (allReadyFilter ? 1 : 0);

        return (
          <div className="panel">
            <div className="phdr">
              <button className="back" onClick={goBack}>‹</button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="phdr-title">Tous les vins</div>
                <div className="phdr-sub">
                  {filtered.length !== bottles.length
                    ? `${filtered.length} / ${bottles.length} bouteille${bottles.length > 1 ? "s" : ""}`
                    : `${bottles.length} bouteille${bottles.length > 1 ? "s" : ""}`}
                </div>
              </div>
              <button className="ibtn" onClick={() => navTo("settings")} title="Paramètres">{Ico.settings}</button>
            </div>

            <div className="sbar" style={{ paddingBottom: 8 }}>
              <div className="sbar-inner">
                {Ico.search}
                <input className="sbar-input" placeholder="Nom, domaine, région, case…" value={allFilter}
                  onChange={e => setAllFilter(e.target.value)} />
                {allFilter && (
                  <button style={{ background:"none",border:"none",color:"#5a4a3a",cursor:"pointer",fontSize:18,lineHeight:1 }}
                    onClick={() => setAllFilter("")}>×</button>
                )}
              </div>
            </div>

            <div className="fchips">
              <button
                className={`fchip ${allReadyFilter ? "fchip-ready-on" : ""}`}
                onClick={() => setAllReadyFilter(v => !v)}>
                <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-5"
                    stroke={allReadyFilter ? "#4caf50" : "currentColor"}
                    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                À boire
              </button>
              {[
                { label: "Rouge", color: "#9b2030" },
                { label: "Blanc", color: "#c4a245" },
                { label: "Rosé",  color: "#c97080" },
              ].map(({ label, color }) => (
                <button
                  key={label}
                  className={`fchip ${allColorFilter === label ? "fchip-on" : ""}`}
                  style={allColorFilter === label
                    ? { borderColor: color + "cc", color: color, background: color + "1a" }
                    : {}}
                  onClick={() => setAllColorFilter(v => v === label ? "" : label)}>
                  <span className="fchip-dot" style={{ background: color }} />
                  {label}
                </button>
              ))}
              {(allColorFilter || allReadyFilter) && (
                <button
                  className="fchip"
                  style={{ color: "#5a4a3a", borderStyle: "dashed" }}
                  onClick={() => { setAllColorFilter(""); setAllReadyFilter(false); }}>
                  Tout effacer
                </button>
              )}
            </div>

            {filtered.length === 0 ? (
              <div className="no-bottles">
                {activeFiltersCount > 0 || allFilter
                  ? "Aucun vin ne correspond à ces filtres"
                  : "Aucune bouteille dans la cave"}
              </div>
            ) : filtered.map(b => (
              <div key={b.ref} className="brow">
                <div className="bthumb">
                  {b.image ? <img src={b.image} alt={b.nom} /> : "🍾"}
                  <span className="bthumb-dot" style={{ background: wc(b.couleur) }} />
                </div>
                <div className="binfo" onClick={() => navTo("detail", { bottle: b })}>
                  <span className="bname">
                    {b.nom || "—"}
                    {isReady(b) && (
                      <span className="ready-badge" style={{ marginLeft: 6 }} title={"À boire dès " + b.boireDes}>
                        <svg width="9" height="9" viewBox="0 0 12 12" fill="none">
                          <path d="M2 6l3 3 5-5" stroke="#4caf50" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                        À boire
                      </span>
                    )}
                  </span>
                  <span className="bprod">
                    {b.producteur || ""}{b.producteur && b.annee ? <span className="bannee"> · {b.annee}</span> : b.annee ? <span className="bannee">{b.annee}</span> : null}
                    {b.rangement ? <span className="bannee"> · Case {b.rangement}</span> : null}
                  </span>
                </div>
                <div className="bactions">
                  <button className="abtn" onClick={() => openEdit(b)} title="Modifier">{Ico.edit}</button>
                  <button className="abtn del" onClick={() => setConfirm(b)} title="Retirer">{Ico.trash}</button>
                </div>
              </div>
            ))}

            {confirm && (
              <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:30,display:"flex",alignItems:"flex-end",justifyContent:"center" }}
                onClick={() => setConfirm(null)}>
                <div style={{ background:"#1e1812",border:"1px solid #322619",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:560 }}
                  onClick={e => e.stopPropagation()}>
                  <div className="confirm-t">Retirer cette bouteille ?</div>
                  <div className="confirm-d" style={{ marginTop:6 }}>
                    <strong>{confirm.nom}</strong>{confirm.producteur ? ` — ${confirm.producteur}` : ""}
                    {confirm.annee ? ` (${confirm.annee})` : ""}
                  </div>
                  <div className="confirm-acts" style={{ marginTop:16 }}>
                    <button className="bghst" onClick={() => setConfirm(null)}>Annuler</button>
                    <button className="bdang" onClick={() => removeBottle(confirm.ref)}>Retirer</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ══ EDIT BOTTLE VIEW ══ */}
      {view === "edit" && editForm && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div className="phdr-title">Modifier la bouteille</div>
          </div>
          <div className="aform">
            <div>
              <label className="flabel">Nom *</label>
              <input className="finput" value={editForm.nom || ""} onChange={efset("nom")} placeholder="Ex : Château Pétrus" />
            </div>
            <div>
              <label className="flabel">Producteur</label>
              <input className="finput" value={editForm.producteur || ""} onChange={efset("producteur")} />
            </div>
            <div>
              <label className="flabel">Couleur</label>
              <div className="cpicker">
                {["Rouge", "Blanc", "Rosé"].map(c => (
                  <button key={c}
                    className={`copt ${editForm.couleur === c ? "s" + c.toLowerCase().replace("é","e")[0] : ""}`}
                    style={editForm.couleur === c ? { borderColor: wc(c)+"cc", color: wc(c), background: wc(c)+"18" } : {}}
                    onClick={() => setEditForm(f => ({ ...f, couleur: c }))}>
                    {c}
                  </button>
                ))}
              </div>
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Millésime</label>
                <input className="finput" type="number" value={editForm.annee || ""} onChange={efset("annee")} placeholder="2022" />
              </div>
              <div>
                <label className="flabel">Case</label>
                <input className="finput" type="number" value={editForm.rangement || ""} onChange={efset("rangement")} min="1" />
              </div>
            </div>
            <div>
              <label className="flabel">Région</label>
              <input className="finput" value={editForm.region || ""} onChange={efset("region")} />
            </div>
            <div>
              <label className="flabel">Appellation</label>
              <input className="finput" value={editForm.appellation || ""} onChange={efset("appellation")} />
            </div>
            <div>
              <label className="flabel">Sous-région</label>
              <input className="finput" value={editForm.sousRegion || ""} onChange={efset("sousRegion")} />
            </div>
            <div>
              <label className="flabel">Cépage</label>
              <input className="finput" value={editForm.cepage || ""} onChange={efset("cepage")} />
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Date d'achat</label>
                <input className="finput" type="date" value={editForm.dateAchat || ""} onChange={efset("dateAchat")} />
              </div>
              <div>
                <label className="flabel">Prix</label>
                <input className="finput" value={editForm.prixAchat || ""} onChange={efset("prixAchat")} placeholder="35,00 €" />
              </div>
            </div>
            <div>
              <label className="flabel">Lieu d'achat</label>
              <input className="finput" value={editForm.lieuAchat || ""} onChange={efset("lieuAchat")} />
            </div>
            <div className="frow">
              <div>
                <label className="flabel">Boire dès</label>
                <input className="finput" type="date" value={editForm.boireDes || ""} onChange={efset("boireDes")} />
              </div>
              <div>
                <label className="flabel">Boire jusque</label>
                <input className="finput" type="date" value={editForm.boireJusque || ""} onChange={efset("boireJusque")} />
              </div>
            </div>
            <div>
              <label className="flabel">Image (URL)</label>
              <input className="finput" value={editForm.image || ""} onChange={efset("image")} placeholder="https://..." />
            </div>
            <div>
              <label className="flabel">Emplacement précis</label>
              <input className="finput" value={editForm.emplacement || ""} onChange={efset("emplacement")} />
            </div>
          </div>
          <div className="stick-btn">
            <button className="btnp" onClick={saveEdit} disabled={!editForm.nom || !editForm.nom.trim() || loading}>
              {loading ? "Enregistrement…" : "Enregistrer les modifications"}
            </button>
          </div>
        </div>
      )}

      {view === "settings" && (
        <div className="panel">
          <div className="phdr">
            <button className="back" onClick={goBack}>‹</button>
            <div className="phdr-title">Paramètres</div>
          </div>
          <div className="sett">
            <div className="sett-h">Connexion Google Sheets</div>
            <div className="sett-d">
              {gasUrl
                ? "✓ Connecté à votre Google Sheet."
                : "Suivez les étapes ci-dessous pour synchroniser l'application avec votre fichier Google Sheets."}
            </div>

            <div className="sett-h" style={{ marginTop: 20, marginBottom: 12 }}>Étape 1 — Déployez le script</div>
            <ol className="sett-steps">
              <li>Ouvrez votre Google Sheet → menu <em>Extensions</em> → <em>Apps Script</em></li>
              <li>Supprimez le code existant et collez le code ci-dessous</li>
              <li>Cliquez <em>Déployer</em> → <em>Nouveau déploiement</em></li>
              <li>Type : <em>Application Web</em> — Accès : <em>Tout le monde</em></li>
              <li>Autorisez et copiez l'URL générée</li>
            </ol>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 16, marginBottom: 8 }}>
              <span className="sett-h" style={{ margin: 0 }}>Code Google Apps Script</span>
              <button className="ibtn" style={{ fontSize: 12, gap: 5, display: "flex", alignItems: "center", color: copied ? "#c4a35a" : "#7a6050" }} onClick={copyGas}>
                {Ico.copy} {copied ? "Copié !" : "Copier"}
              </button>
            </div>
            <div className="sett-code">{GAS_CODE}</div>

            <div className="sett-h" style={{ marginTop: 20 }}>Étape 2 — Collez l'URL ici</div>
            <input className="finput" value={gasInput} onChange={e => setGasInput(e.target.value)}
              placeholder="https://script.google.com/macros/s/…" style={{ marginBottom: 12 }} />
            <button className="btnp" onClick={saveGas} style={{ marginBottom: 0 }}>
              {loading ? "Connexion…" : "Enregistrer et synchroniser"}
            </button>

            <hr className="hr" />

            <div className="sett-h">État</div>
            <div className="sett-d">
              {isDemo
                ? "Mode démo — les données ne sont pas synchronisées avec Google Sheets."
                : `Connecté. ${bottles.length} bouteille${bottles.length > 1 ? "s" : ""} chargée${bottles.length > 1 ? "s" : ""}.`}
            </div>
            {gasUrl && (
              <button className="bghst" style={{ marginTop: 8, width: "100%" }} onClick={() => loadFromGas(gasUrl)}>
                {loading ? "Synchronisation…" : "Synchroniser maintenant"}
              </button>
            )}
          </div>
        </div>
      )}

      {/* ══ BOTTOM SHEET ══ */}
      {sheet && (
        <>
          <div className="bkdrop" onClick={() => setSheet(false)} />
          <div className="bsheet">
            <div className="bsh-handle" />
            <div className="bsh-title">
              Case {slot} · {slotData[((slot - 1) % 8) + 1]?.count || 0} / {MAX} bouteilles
            </div>
            <button className="bsh-btn" onClick={openList}>
              <div className="bsh-icon">{Ico.list}</div>
              <div>
                <div>Voir les bouteilles</div>
                <div className="bsh-sub">{slotData[((slot - 1) % 8) + 1]?.count || 0} bouteille{(slotData[((slot - 1) % 8) + 1]?.count || 0) !== 1 ? "s" : ""} dans cette case</div>
              </div>
            </button>
            {(slotData[((slot - 1) % 8) + 1]?.count || 0) < MAX && (
              <button className="bsh-btn" onClick={openAdd}>
                <div className="bsh-icon">{Ico.plus}</div>
                <div>
                  <div>Ajouter une bouteille</div>
                  <div className="bsh-sub">{MAX - (slotData[((slot - 1) % 8) + 1]?.count || 0)} emplacement{MAX - (slotData[((slot - 1) % 8) + 1]?.count || 0) > 1 ? "s" : ""} libre{MAX - (slotData[((slot - 1) % 8) + 1]?.count || 0) > 1 ? "s" : ""}</div>
                </div>
              </button>
            )}
          </div>
        </>
      )}

      {/* ══ VALEUR MODAL ══ */}
      {showValeur && (
        <>
          <div className="bkdrop" onClick={() => setShowValeur(false)} />
          <div className="bsheet">
            <div className="bsh-handle" />
            <div style={{ padding: "0 20px 8px", fontSize: 14, color: "#8a7060", letterSpacing: "0.05em" }}>
              Valeur estimée de la cave
            </div>
            <div style={{ padding: "16px 20px 0" }}>
              <div style={{ background: "#120e0a", border: "1px solid #322619", borderRadius: 12, padding: "24px 20px", textAlign: "center", marginBottom: 16 }}>
                <div style={{ fontSize: 38, fontWeight: "bold", color: "#c4a35a", letterSpacing: "0.02em" }}>
                  {totalValeur.sum.toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €
                </div>
                <div style={{ fontSize: 12, color: "#5a4a3a", marginTop: 8, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                  sur {totalValeur.count} bouteille{totalValeur.count > 1 ? "s" : ""} renseignée{totalValeur.count > 1 ? "s" : ""}
                </div>
              </div>
              <div style={{ display: "flex", gap: 12, marginBottom: 8 }}>
                <div style={{ flex: 1, background: "#1e1812", border: "1px solid #322619", borderRadius: 10, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 18, color: "#e0d4c0" }}>
                    {totalValeur.count > 0 ? (totalValeur.sum / totalValeur.count).toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—"} €
                  </div>
                  <div style={{ fontSize: 10, color: "#4a3a2a", marginTop: 4, textTransform: "uppercase", letterSpacing: "0.08em" }}>Prix moyen</div>
                </div>
                <div style={{ flex: 1, background: "#1e1812", border: "1px solid #322619", borderRadius: 10, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 18, color: "#e0d4c0" }}>{bottles.length - totalValeur.count}</div>
                  <div style={{ fontSize: 10, color: "#4a3a2a", marginTop: 4, textTransform: "uppercase", letterSpacing: "0.08em" }}>Sans prix</div>
                </div>
              </div>
              {totalValeur.count < bottles.length && (
                <div style={{ fontSize: 12, color: "#4a3a2a", textAlign: "center", paddingBottom: 8, fontStyle: "italic" }}>
                  La valeur réelle peut être supérieure — {bottles.length - totalValeur.count} bouteille{bottles.length - totalValeur.count > 1 ? "s" : ""} sans prix renseigné.
                </div>
              )}
              <button className="btnp" onClick={() => setShowValeur(false)} style={{ marginTop: 4 }}>Fermer</button>
            </div>
          </div>
        </>
      )}

      {/* ══ TOAST ══ */}
      {toast && <div className={`toast ${toastType === "err" ? "err" : ""}`} key={toast + Date.now()}>{toast}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════
// SEARCH RESULTS LIST
// ═══════════════════════════════════════════
function SearchList({ results, onSelect }) {
  return (
    <div>
      {results.length === 0 ? (
        <div className="sempty">Aucun résultat — essayez un nom, domaine ou numéro de case</div>
      ) : results.map(b => (
        <div key={b.ref} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 20px", borderBottom: "1px solid #1c1610", cursor: "pointer" }}
          onClick={() => onSelect(b)}>
          <div style={{ width: 44, height: 44, borderRadius: 8, background: "#1e1812", border: "1px solid #322619", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
            {b.image ? <img src={b.image} alt={b.nom} style={{ width: "100%", height: "100%", objectFit: "cover", borderRadius: 8 }} /> : "🍾"}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, color: "#e0d4c0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.nom}</div>
            <div style={{ fontSize: 12, color: "#6a5a4a", marginTop: 2 }}>
              {[b.producteur, b.annee, b.rangement ? `Case ${b.rangement}` : null].filter(Boolean).join(" · ")}
            </div>
          </div>
          <div style={{ color: "#3a2d22", fontSize: 18 }}>›</div>
        </div>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
